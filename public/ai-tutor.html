<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FREE AI Physics Tutor - Srikanth Academy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .badge {
            background: #2ecc71;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .chat-box {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            height: 600px;
            display: flex;
            flex-direction: column;
        }
        
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        
        .message {
            margin-bottom: 20px;
            animation: fadeIn 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .msg-user {
            text-align: right;
        }
        
        .msg-content {
            display: inline-block;
            max-width: 75%;
            padding: 15px 20px;
            border-radius: 18px;
            line-height: 1.6;
        }
        
        .msg-user .msg-content {
            background: #667eea;
            color: white;
        }
        
        .msg-ai .msg-content {
            background: #f0f0f0;
            text-align: left;
        }
        
        .sources {
            margin-top: 10px;
            padding: 10px;
            background: #e8f5e9;
            border-radius: 10px;
            font-size: 0.85em;
        }
        
        .input-area {
            padding: 20px;
            background: #f5f5f5;
            border-top: 1px solid #ddd;
        }
        
        .quick-btns {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .quick-btn {
            padding: 8px 15px;
            background: white;
            border: 2px solid #667eea;
            border-radius: 20px;
            color: #667eea;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }
        
        .quick-btn:hover {
            background: #667eea;
            color: white;
        }
        
        .input-row {
            display: flex;
            gap: 10px;
        }
        
        #questionInput {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #ddd;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
        }
        
        #questionInput:focus {
            border-color: #667eea;
        }
        
        #askBtn {
            padding: 15px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        
        #askBtn:hover {
            background: #5568d3;
        }
        
        #askBtn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="badge">💯 100% FREE RAG</div>
            <h1>🎓 AI Physics Tutor</h1>
            <p>Srikanth Academy | ChromaDB (Local) + NCERT Content</p>
        </div>
        
        <div class="chat-box">
            <div class="messages" id="messages">
                <div class="message msg-ai">
                    <div class="msg-content">
                        👋 Hello! I'm your <strong>FREE</strong> AI Physics Tutor!
                        <br><br>
                        💡 Powered by:
                        <br>✅ Local ChromaDB (₹0 cost)
                        <br>✅ NCERT Class 11 & 12 Physics
                        <br>✅ 100% Free embeddings
                        <br><br>
                        Ask me anything about AP Physics!
                    </div>
                </div>
            </div>
            
            <div class="input-area">
                <div class="quick-btns">
                    <button class="quick-btn" onclick="ask('Explain Newton\'s Third Law')">
                        Newton's Law
                    </button>
                    <button class="quick-btn" onclick="ask('What is projectile motion?')">
                        Projectile Motion
                    </button>
                    <button class="quick-btn" onclick="ask('Explain Ohm\'s Law')">
                        Ohm's Law
                    </button>
                    <button class="quick-btn" onclick="ask('How do transformers work?')">
                        Transformers
                    </button>
                </div>
                
                <div class="input-row">
                    <input 
                        type="text" 
                        id="questionInput" 
                        placeholder="Ask your physics question..."
                        onkeypress="if(event.key==='Enter') askQuestion()"
                    >
                    <button id="askBtn" onclick="askQuestion()">Ask</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API = 'http://localhost:8000';  // Change when deployed
        
        function addMsg(text, isUser, sources) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'msg-user' : 'msg-ai'}`;
            
            let html = `<div class="msg-content">${text}</div>`;
            
            if (sources) {
                html += '<div class="sources"><strong>📚 Sources:</strong><br>';
                sources.forEach((s, i) => {
                    html += `${i+1}. NCERT Class ${s.class}<br>`;
                });
                html += '</div>';
            }
            
            div.innerHTML = html;
            document.getElementById('messages').appendChild(div);
            div.scrollIntoView({ behavior: 'smooth' });
        }
        
        function showLoader() {
            const div = document.createElement('div');
            div.className = 'message msg-ai';
            div.id = 'loader';
            div.innerHTML = '<div class="msg-content"><div class="loader"></div> Thinking...</div>';
            document.getElementById('messages').appendChild(div);
            div.scrollIntoView({ behavior: 'smooth' });
        }
        
        function hideLoader() {
            const loader = document.getElementById('loader');
            if (loader) loader.remove();
        }
        
        async function askQuestion() {
            const input = document.getElementById('questionInput');
            const btn = document.getElementById('askBtn');
            const q = input.value.trim();
            
            if (!q) return;
            
            addMsg(q, true);
            input.value = '';
            btn.disabled = true;
            showLoader();
            
            try {
                const res = await fetch(`${API}/ask`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: q })
                });
                
                const data = await res.json();
                hideLoader();
                addMsg(data.answer, false, data.sources);
                
            } catch (err) {
                hideLoader();
                addMsg('❌ Error! Make sure API is running at ' + API, false);
                console.error(err);
            } finally {
                btn.disabled = false;
            }
        }
        
        function ask(q) {
            document.getElementById('questionInput').value = q;
            askQuestion();
        }
    </script>
</body>
</html>
